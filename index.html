<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프리미엄 QR 코드 안녕</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- QR Code Styling Library (easyqrcodejs) -->
  <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.3/dist/easy.qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- 네비게이션 바 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-indigo-100">
          <i class="fa-solid fa-qrcode text-xl"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900 leading-none">QR Craft</h1>
          <span class="text-xs text-slate-500">스마트 QR코드 디자이너</span>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button id="btn-reset" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1.5">
          <i class="fa-solid fa-rotate-left"></i> 초기화
        </button>
      </div>
    </div>
  </header>

  <!-- 메인 레이아웃 -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- 왼쪽 영역: 입력 및 디자인 설정 (8/12) -->
      <section class="lg:col-span-7 xl:col-span-8 flex flex-col gap-6">
        
        <!-- 데이터 타입 탭 -->
        <div class="bg-white rounded-2xl border border-slate-200 p-1 shadow-sm flex flex-wrap gap-1">
          <button onclick="switchType('url')" id="tab-url" class="tab-btn flex-1 min-w-[80px] py-2.5 px-3 rounded-xl text-sm font-medium text-center flex flex-col sm:flex-row items-center justify-center gap-2 transition-all bg-indigo-600 text-white shadow-sm">
            <i class="fa-solid fa-link text-base"></i>
            <span>웹 URL</span>
          </button>
          <button onclick="switchType('text')" id="tab-text" class="tab-btn flex-1 min-w-[80px] py-2.5 px-3 rounded-xl text-sm font-medium text-center flex flex-col sm:flex-row items-center justify-center gap-2 transition-all text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-align-left"></i>
            <span>텍스트</span>
          </button>
          <button onclick="switchType('wifi')" id="tab-wifi" class="tab-btn flex-1 min-w-[80px] py-2.5 px-3 rounded-xl text-sm font-medium text-center flex flex-col sm:flex-row items-center justify-center gap-2 transition-all text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-wifi"></i>
            <span>와이파이</span>
          </button>
          <button onclick="switchType('vcard')" id="tab-vcard" class="tab-btn flex-1 min-w-[80px] py-2.5 px-3 rounded-xl text-sm font-medium text-center flex flex-col sm:flex-row items-center justify-center gap-2 transition-all text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-address-card"></i>
            <span>연락처</span>
          </button>
        </div>

        <!-- 데이터 입력 상자 -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
          <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
            정보 입력하기
          </h2>

          <!-- URL 입력 폼 -->
          <div id="form-url" class="type-form space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">대상 웹사이트 주소 (URL)</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                  <i class="fa-solid fa-globe"></i>
                </div>
                <input type="url" id="input-url" value="https://www.google.com" placeholder="https://example.com" class="pl-10 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
            </div>
          </div>

          <!-- 일반 텍스트 입력 폼 -->
          <div id="form-text" class="type-form hidden space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">QR에 담을 메시지 또는 텍스트</label>
              <textarea id="input-text" rows="3" placeholder="스캔 시 화면에 보여주고 싶은 문장이나 긴 텍스트를 입력하세요." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm resize-none"></textarea>
            </div>
          </div>

          <!-- 와이파이 입력 폼 -->
          <div id="form-wifi" class="type-form hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">네트워크 이름 (SSID)</label>
                <input type="text" id="input-wifi-ssid" placeholder="MyHome_WiFi" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">비밀번호 (Password)</label>
                <input type="text" id="input-wifi-pass" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">보안 방식</label>
              <select id="input-wifi-type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
                <option value="WPA" selected>WPA/WPA2</option>
                <option value="WEP">WEP</option>
                <option value="nopass">보안 없음 (Open)</option>
              </select>
            </div>
          </div>

          <!-- 연락처(vCard) 입력 폼 -->
          <div id="form-vcard" class="type-form hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">이름</label>
                <input type="text" id="input-card-name" placeholder="홍길동" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">전화번호</label>
                <input type="tel" id="input-card-phone" placeholder="010-1234-5678" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">이메일</label>
                <input type="email" id="input-card-email" placeholder="example@mail.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">회사 / 소속</label>
                <input type="text" id="input-card-org" placeholder="길동 컴퍼니" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
              </div>
            </div>
          </div>

        </div>

        <!-- 커스터마이징 설정 패널 -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-6">
          <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
            <span class="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
            디자인 커스텀 마이징
          </h2>

          <!-- 색상 테마 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">QR 코드 전경색 (Foreground)</label>
              <div class="flex gap-2">
                <input type="color" id="color-foreground" value="#1e1b4b" class="w-12 h-12 rounded-lg border border-slate-200 cursor-pointer overflow-hidden p-0">
                <input type="text" id="color-foreground-hex" value="#1E1B4B" class="flex-grow px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none text-sm uppercase font-mono">
              </div>
              <!-- 기본 컬러 추천 칩 -->
              <div class="flex flex-wrap gap-1.5 mt-2">
                <button onclick="setForeColor('#1E1B4B')" class="w-6 h-6 rounded-full bg-[#1E1B4B] border border-slate-200" title="네이비"></button>
                <button onclick="setForeColor('#000000')" class="w-6 h-6 rounded-full bg-[#000000] border border-slate-200" title="블랙"></button>
                <button onclick="setForeColor('#0F766E')" class="w-6 h-6 rounded-full bg-[#0F766E] border border-slate-200" title="티일"></button>
                <button onclick="setForeColor('#B91C1C')" class="w-6 h-6 rounded-full bg-[#B91C1C] border border-slate-200" title="레드"></button>
                <button onclick="setForeColor('#4338CA')" class="w-6 h-6 rounded-full bg-[#4338CA] border border-slate-200" title="인디고"></button>
                <button onclick="setForeColor('#0369A1')" class="w-6 h-6 rounded-full bg-[#0369A1] border border-slate-200" title="블루"></button>
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">배경색 (Background)</label>
              <div class="flex gap-2">
                <input type="color" id="color-background" value="#ffffff" class="w-12 h-12 rounded-lg border border-slate-200 cursor-pointer overflow-hidden p-0">
                <input type="text" id="color-background-hex" value="#FFFFFF" class="flex-grow px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none text-sm uppercase font-mono">
              </div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <button onclick="setBgColor('#FFFFFF')" class="w-6 h-6 rounded-full bg-[#FFFFFF] border border-slate-200" title="화이트"></button>
                <button onclick="setBgColor('#F8FAFC')" class="w-6 h-6 rounded-full bg-[#F8FAFC] border border-slate-200" title="슬레이트"></button>
                <button onclick="setBgColor('#FEF3C7')" class="w-6 h-6 rounded-full bg-[#FEF3C7] border border-slate-200" title="앰버"></button>
                <button onclick="setBgColor('#F0FDF4')" class="w-6 h-6 rounded-full bg-[#F0FDF4] border border-slate-200" title="그린"></button>
                <button onclick="setBgColor('#EFF6FF')" class="w-6 h-6 rounded-full bg-[#EFF6FF] border border-slate-200" title="라이트블루"></button>
              </div>
            </div>
          </div>

          <!-- 로고 및 내부 아이콘 -->
          <div class="border-t border-slate-100 pt-5">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">QR 내 로고 설정</label>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <!-- 로고 없음 -->
              <button onclick="selectLogo('none')" id="logo-opt-none" class="logo-btn p-3 border-2 border-indigo-600 rounded-xl text-left flex items-center gap-3 bg-indigo-50/50">
                <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400">
                  <i class="fa-solid fa-ban text-xs"></i>
                </div>
                <div>
                  <p class="text-xs font-semibold text-slate-900">없음</p>
                  <p class="text-[10px] text-slate-400">로고를 사용하지 않음</p>
                </div>
              </button>

              <!-- 사전 탑재 아이콘 -->
              <button onclick="selectLogo('preset')" id="logo-opt-preset" class="logo-btn p-3 border border-slate-200 rounded-xl text-left flex items-center gap-3 hover:bg-slate-50">
                <div class="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center">
                  <i class="fa-solid fa-star text-sm"></i>
                </div>
                <div>
                  <p class="text-xs font-semibold text-slate-900">제공 이모지</p>
                  <p class="text-[10px] text-slate-400">추천 아이콘 삽입</p>
                </div>
              </button>

              <!-- 커스텀 업로드 -->
              <label for="logo-upload" id="logo-opt-upload" class="logo-btn p-3 border border-slate-200 rounded-xl text-left flex items-center gap-3 hover:bg-slate-50 cursor-pointer">
                <div class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center">
                  <i class="fa-solid fa-upload text-sm"></i>
                </div>
                <div>
                  <p class="text-xs font-semibold text-slate-900">직접 업로드</p>
                  <p class="text-[10px] text-slate-400">사용자 이미지 파일</p>
                </div>
                <input type="file" id="logo-upload" accept="image/*" class="hidden">
              </label>
            </div>

            <!-- 프리셋 아이콘 선택창 -->
            <div id="preset-icons-area" class="hidden mt-3 p-3 bg-slate-50 border border-slate-100 rounded-xl">
              <p class="text-[11px] font-semibold text-slate-500 mb-2">프리셋 아이콘 목록:</p>
              <div class="flex flex-wrap gap-2">
                <button onclick="setPresetEmoji('✨')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">✨</button>
                <button onclick="setPresetEmoji('🚀')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">🚀</button>
                <button onclick="setPresetEmoji('❤️')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">❤️</button>
                <button onclick="setPresetEmoji('🔥')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">🔥</button>
                <button onclick="setPresetEmoji('💡')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">💡</button>
                <button onclick="setPresetEmoji('☕')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">☕</button>
                <button onclick="setPresetEmoji('📍')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">📍</button>
                <button onclick="setPresetEmoji('📞')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">📞</button>
                <button onclick="setPresetEmoji('💼')" class="preset-emoji-btn w-9 h-9 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm hover:border-indigo-500 hover:scale-105 transition-all">💼</button>
              </div>
            </div>

            <!-- 업로드된 이미지 정보 표시 -->
            <div id="uploaded-info-area" class="hidden mt-3 p-3 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-between">
              <div class="flex items-center gap-2">
                <img id="uploaded-logo-preview" class="w-8 h-8 rounded object-cover border border-slate-200" src="" alt="업로드 이미지">
                <span id="uploaded-logo-name" class="text-xs font-medium text-slate-600 truncate max-w-[200px]">image.png</span>
              </div>
              <button onclick="clearUploadedLogo()" class="text-xs font-semibold text-rose-500 hover:text-rose-700 transition-colors">삭제</button>
            </div>
          </div>

          <!-- 도트 스타일 & 라운딩 처리 -->
          <div class="border-t border-slate-100 pt-5 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">QR 도트 모양</label>
              <select id="select-dot-type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
                <option value="rect" selected>네모 (기본 사각형)</option>
                <option value="dot">둥근 원 (도트)</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">눈 형태 (Timing/Position Pattern)</label>
              <select id="select-eye-type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
                <option value="rect" selected>일반 사각형</option>
                <option value="rounded">둥근 모서리 사각형</option>
              </select>
            </div>
          </div>

        </div>

      </section>

      <!-- 오른쪽 영역: 결과 미리보기 및 저장 히스토리 (4/12) -->
      <section class="lg:col-span-5 xl:col-span-4 flex flex-col gap-6">
        
        <!-- 미리보기 패널 -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm sticky top-24 flex flex-col items-center">
          <h2 class="text-base font-bold text-slate-900 w-full mb-6 flex items-center gap-2">
            <span class="w-1.5 h-4 bg-emerald-500 rounded-full"></span>
            실시간 QR 코드
          </h2>

          <!-- QR 디스플레이 홀더 -->
          <div class="relative group bg-white border border-slate-100 shadow-inner rounded-2xl p-6 w-full max-w-[280px] aspect-square flex items-center justify-center transition-transform duration-300">
            <div id="qrcode" class="w-full h-full flex items-center justify-center overflow-hidden">
              <!-- 라이브러리를 통해 여기에 QR 코드가 생성됩니다 -->
            </div>
            <!-- 로딩 마스크 -->
            <div id="qr-loading" class="absolute inset-0 bg-white/80 rounded-2xl flex items-center justify-center hidden">
              <i class="fa-solid fa-spinner fa-spin text-2xl text-indigo-600"></i>
            </div>
          </div>

          <!-- 데이터 유효성 안내 / 스캔 독려 텍스트 -->
          <div class="mt-4 text-center">
            <p class="text-xs text-slate-500 flex items-center justify-center gap-1">
              <i class="fa-solid fa-camera"></i> 스마트폰 카메라로 비춰 스캔해보세요!
            </p>
          </div>

          <!-- 다운로드 버튼 세트 -->
          <div class="w-full mt-6 space-y-3">
            <button onclick="downloadQR('png')" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded-xl font-semibold text-sm transition-all shadow-md shadow-indigo-100 flex items-center justify-center gap-2">
              <i class="fa-solid fa-download"></i> PNG 이미지 다운로드
            </button>
            <button onclick="downloadQR('svg')" class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold text-sm transition-all flex items-center justify-center gap-2">
              <i class="fa-solid fa-code"></i> SVG 벡터 다운로드
            </button>
          </div>

          <!-- 내역 저장하기 (로컬) -->
          <div class="w-full border-t border-slate-100 mt-6 pt-5">
            <button onclick="saveToHistory()" class="w-full py-2.5 border border-dashed border-slate-300 hover:border-indigo-500 hover:text-indigo-600 rounded-xl text-xs font-semibold text-slate-500 transition-all flex items-center justify-center gap-1.5">
              <i class="fa-regular fa-bookmark"></i> 현재 설정을 보관함에 저장하기
            </button>
          </div>
        </div>

        <!-- 마이 히스토리 -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-bold text-slate-900 flex items-center gap-2">
              <i class="fa-solid fa-clock-rotate-left text-slate-400"></i>
              내 보관함
            </h2>
            <button onclick="clearAllHistory()" class="text-[11px] font-semibold text-slate-400 hover:text-rose-500 transition-colors">전체 삭제</button>
          </div>

          <!-- 저장 목록 리스트 -->
          <div id="history-container" class="space-y-3 max-h-[250px] overflow-y-auto pr-1">
            <!-- 비어 있는 상태 표시 -->
            <div id="history-empty" class="text-center py-8 text-slate-400">
              <i class="fa-regular fa-folder-open text-2xl mb-2 block"></i>
              <p class="text-xs">저장된 QR 코드가 없습니다.</p>
            </div>
          </div>
        </div>

      </section>

    </div>
  </main>

  <!-- 토스트 알림창 -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 transform translate-y-12 opacity-0 transition-all duration-300 pointer-events-none">
    <div id="toast-icon" class="text-emerald-400">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <span id="toast-msg" class="text-xs font-semibold">알림 메시지</span>
  </div>

  <footer class="bg-white border-t border-slate-100 py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-400">
      <p>&copy; 2026 QR Craft. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // 상태 관리 객체
    let state = {
      type: 'url', // 'url', 'text', 'wifi', 'vcard'
      colors: {
        foreground: '#1E1B4B',
        background: '#FFFFFF'
      },
      logoType: 'none', // 'none', 'preset', 'upload'
      presetEmoji: '✨',
      uploadedLogoUrl: null,
      uploadedLogoName: '',
      dotStyle: 'rect', // 'rect', 'dot'
      eyeStyle: 'rect', // 'rect', 'rounded'
      history: []
    };

    let qrCodeInstance = null;

    // 초기 로딩
    window.onload = function() {
      initEventListeners();
      loadHistoryFromLocal();
      generateQR();
    };

    // 이벤트 리스너 초기화
    function initEventListeners() {
      // 인풋 값 변경 시 실시간 재생성
      const inputsToWatch = [
        'input-url', 'input-text', 'input-wifi-ssid', 'input-wifi-pass', 'input-wifi-type',
        'input-card-name', 'input-card-phone', 'input-card-email', 'input-card-org',
        'select-dot-type', 'select-eye-type'
      ];

      inputsToWatch.forEach(id => {
        document.getElementById(id).addEventListener('input', debounce(generateQR, 300));
      });

      // 컬러 피커 이벤트
      const foreColor = document.getElementById('color-foreground');
      const foreHex = document.getElementById('color-foreground-hex');
      const bgColor = document.getElementById('color-background');
      const bgHex = document.getElementById('color-background-hex');

      foreColor.addEventListener('input', (e) => {
        state.colors.foreground = e.target.value;
        foreHex.value = e.target.value.toUpperCase();
        generateQR();
      });
      foreHex.addEventListener('input', (e) => {
        if (e.target.value.startsWith('#') && e.target.value.length === 7) {
          state.colors.foreground = e.target.value;
          foreColor.value = e.target.value;
          generateQR();
        }
      });

      bgColor.addEventListener('input', (e) => {
        state.colors.background = e.target.value;
        bgHex.value = e.target.value.toUpperCase();
        generateQR();
      });
      bgHex.addEventListener('input', (e) => {
        if (e.target.value.startsWith('#') && e.target.value.length === 7) {
          state.colors.background = e.target.value;
          bgColor.value = e.target.value;
          generateQR();
        }
      });

      // 파일 업로드 처리
      document.getElementById('logo-upload').addEventListener('change', handleLogoUpload);

      // 리셋 버튼
      document.getElementById('btn-reset').addEventListener('click', resetAll);
    }

    // 디바운싱 함수 (자연스러운 입력 처리)
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // QR코드 데이터 포맷 생성
    function getQRData() {
      switch (state.type) {
        case 'url':
          let url = document.getElementById('input-url').value.trim();
          if (!url) return 'https://www.google.com';
          if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
          }
          return url;
        
        case 'text':
          return document.getElementById('input-text').value || 'Hello, world!';
        
        case 'wifi':
          const ssid = document.getElementById('input-wifi-ssid').value || 'My_SSID';
          const pass = document.getElementById('input-wifi-pass').value || '';
          const secType = document.getElementById('input-wifi-type').value;
          // WiFi 포맷: WIFI:S:SSID;T:WEP;P:PASSWORD;;
          return `WIFI:S:${ssid};T:${secType};P:${pass};;`;
        
        case 'vcard':
          const name = document.getElementById('input-card-name').value || '이름';
          const tel = document.getElementById('input-card-phone').value || '';
          const mail = document.getElementById('input-card-email').value || '';
          const org = document.getElementById('input-card-org').value || '';
          
          return `BEGIN:VCARD\nVERSION:3.0\nN:${name}\nORG:${org}\nTEL:${tel}\nEMAIL:${mail}\nEND:VCARD`;
        
        default:
          return 'https://www.google.com';
      }
    }

    // QR 코드 생성 메인 로직
    function generateQR() {
      const qrContainer = document.getElementById('qrcode');
      const loader = document.getElementById('qr-loading');
      loader.classList.remove('hidden');

      // 기존 캔버스 제거
      qrContainer.innerHTML = '';

      const content = getQRData();

      // EasyQRCodeJS 라이브러리 사용 구성 옵션 정의
      let config = {
        text: content,
        width: 256,
        height: 256,
        colorDark: state.colors.foreground,
        colorLight: state.colors.background,
        correctLevel: QRCode.CorrectLevel.H, // 로고 삽입을 위해 높은 오류 보정 수준 유지
        
        // 도트 및 코너 커스텀 디자인
        dotScale: 0.85,
        PO_TL: state.eyeStyle === 'rounded' ? state.colors.foreground : undefined, // Top-Left Eye
        PO_TR: state.eyeStyle === 'rounded' ? state.colors.foreground : undefined, // Top-Right Eye
        PO_BL: state.eyeStyle === 'rounded' ? state.colors.foreground : undefined, // Bottom-Left Eye
      };

      // 둥근 도트 디자인인 경우 도트 모양 커스텀
      if (state.dotStyle === 'dot') {
        config.drawer = 'svg'; // SVG 서랍 사용 시 디자인 옵션 강화 가능
      }

      // 로고 삽입 여부 처리
      if (state.logoType === 'preset' && state.presetEmoji) {
        config.logo = createEmojiLogo(state.presetEmoji);
        config.logoWidth = 55;
        config.logoHeight = 55;
        config.logoBgColor = state.colors.background;
        config.logoBackgroundTransparent = false;
      } else if (state.logoType === 'upload' && state.uploadedLogoUrl) {
        config.logo = state.uploadedLogoUrl;
        config.logoWidth = 55;
        config.logoHeight = 55;
        config.logoBgColor = state.colors.background;
        config.logoBackgroundTransparent = false;
      }

      // 인스턴스 생성 및 빌드
      try {
        qrCodeInstance = new QRCode(qrContainer, config);
      } catch (err) {
        console.error("QR Code 생성 에러:", err);
      }

      // 눈(Eye) 디자인 보강 (CSS/DOM 핸들링)
      setTimeout(() => {
        applyStyleFixes();
        loader.classList.add('hidden');
      }, 100);
    }

    // 둥근 테두리 및 도트 세부 조정
    function applyStyleFixes() {
      if (state.eyeStyle === 'rounded') {
        const svgElement = document.querySelector('#qrcode svg');
        if (svgElement) {
          // 필요 시 SVG 내부 패스를 직접 수정하는 추가 커스텀 코드 영역
        }
      }
    }

    // 이모지를 캔버스에서 이미지 데이터로 변환 (EasyQRCode에 태우기 위함)
    function createEmojiLogo(emoji) {
      const canvas = document.createElement('canvas');
      canvas.width = 100;
      canvas.height = 100;
      const ctx = canvas.getContext('2d');
      
      // 배경색 투명 또는 흰색 원
      ctx.beginPath();
      ctx.arc(50, 50, 48, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      
      // 테두리
      ctx.strokeStyle = state.colors.foreground;
      ctx.lineWidth = 4;
      ctx.stroke();

      // 글자 그리기
      ctx.font = '55px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emoji, 50, 53);

      return canvas.toDataURL();
    }

    // 탭 교체
    function switchType(type) {
      state.type = type;
      
      // 버튼 하이라이트 전환
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
        btn.classList.add('text-slate-600', 'hover:bg-slate-50');
      });

      const activeTab = document.getElementById(`tab-${type}`);
      activeTab.classList.remove('text-slate-600', 'hover:bg-slate-50');
      activeTab.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');

      // 입력 폼 전환
      document.querySelectorAll('.type-form').forEach(form => form.classList.add('hidden'));
      document.getElementById(`form-${type}`).classList.remove('hidden');

      generateQR();
    }

    // 전경색 숏컷 설정
    function setForeColor(color) {
      state.colors.foreground = color;
      document.getElementById('color-foreground').value = color;
      document.getElementById('color-foreground-hex').value = color.toUpperCase();
      generateQR();
    }

    // 배경색 숏컷 설정
    function setBgColor(color) {
      state.colors.background = color;
      document.getElementById('color-background').value = color;
      document.getElementById('color-background-hex').value = color.toUpperCase();
      generateQR();
    }

    // 로고 타입 선택
    function selectLogo(type) {
      state.logoType = type;

      // 액티브 보더 토글
      document.querySelectorAll('.logo-btn').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'bg-indigo-50/50');
        btn.classList.add('border-slate-200');
      });

      const targetBtn = document.getElementById(`logo-opt-${type}`);
      if (targetBtn) {
        targetBtn.classList.remove('border-slate-200');
        targetBtn.classList.add('border-indigo-600', 'bg-indigo-50/50');
      }

      // 프리셋 패널 토글
      const presetArea = document.getElementById('preset-icons-area');
      if (type === 'preset') {
        presetArea.classList.remove('hidden');
      } else {
        presetArea.classList.add('hidden');
      }

      // 직접 업로드 표시 토글
      const uploadArea = document.getElementById('uploaded-info-area');
      if (type === 'upload' && state.uploadedLogoUrl) {
        uploadArea.classList.remove('hidden');
      } else {
        uploadArea.classList.add('hidden');
      }

      generateQR();
    }

    // 프리셋 이모지 선택
    function setPresetEmoji(emoji) {
      state.presetEmoji = emoji;
      
      // 보더 하이라이트
      document.querySelectorAll('.preset-emoji-btn').forEach(btn => {
        if (btn.innerText === emoji) {
          btn.classList.add('border-indigo-500', 'bg-indigo-50');
        } else {
          btn.classList.remove('border-indigo-500', 'bg-indigo-50');
        }
      });

      generateQR();
    }

    // 직접 로고 업로드 이벤트 처리
    function handleLogoUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        showToast('warning', '파일 크기가 너무 큽니다. (최대 2MB)');
        return;
      }

      state.uploadedLogoName = file.name;

      const reader = new FileReader();
      reader.onload = function(event) {
        state.uploadedLogoUrl = event.target.result;
        
        // 업로드 파일 레이블 영역 업데이트
        document.getElementById('uploaded-logo-preview').src = event.target.result;
        document.getElementById('uploaded-logo-name').innerText = file.name;
        
        // 업로드 표시 영역 보이기
        document.getElementById('uploaded-info-area').classList.remove('hidden');

        // 상태를 'upload'로 스위칭
        selectLogo('upload');
      };
      reader.readAsDataURL(file);
    }

    // 업로드 파일 해제
    function clearUploadedLogo() {
      state.uploadedLogoUrl = null;
      state.uploadedLogoName = '';
      document.getElementById('uploaded-info-area').classList.add('hidden');
      document.getElementById('logo-upload').value = '';
      selectLogo('none');
    }

    // 다운로드 처리
    function downloadQR(format) {
      // 이미지 엘리먼트 가져오기 (EasyQRCode 라이브러리가 img 또는 canvas로 렌더링함)
      const qrHolder = document.getElementById('qrcode');
      const img = qrHolder.querySelector('img');
      const canvas = qrHolder.querySelector('canvas');

      const fileName = `qrcode_craft_${Date.now()}`;

      if (format === 'png') {
        if (img && img.src) {
          triggerDownload(img.src, `${fileName}.png`);
        } else if (canvas) {
          const dataUrl = canvas.toDataURL('image/png');
          triggerDownload(dataUrl, `${fileName}.png`);
        } else {
          showToast('error', 'QR 코드 이미지를 찾을 수 없습니다.');
        }
      } else if (format === 'svg') {
        // SVG 다운로드 처리 (drawer가 svg 방식인 경우 타깃 svg 확보)
        const svg = qrHolder.querySelector('svg');
        if (svg) {
          const svgData = new XMLSerializer().serializeToString(svg);
          const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
          const svgUrl = URL.createObjectURL(svgBlob);
          triggerDownload(svgUrl, `${fileName}.svg`);
        } else {
          // 캔버스밖에 없거나 이미지만 있는 경우 알림 후 우회
          showToast('warning', '현재 스타일은 SVG 내보내기를 완벽하게 지원하지 않아 PNG 다운로드를 권장합니다.');
        }
      }
    }

    function triggerDownload(url, name) {
      const link = document.createElement('a');
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('success', '다운로드가 완료되었습니다!');
    }

    // 전체 리셋
    function resetAll() {
      // 기본 상태 복구
      state = {
        type: 'url',
        colors: {
          foreground: '#1E1B4B',
          background: '#FFFFFF'
        },
        logoType: 'none',
        presetEmoji: '✨',
        uploadedLogoUrl: null,
        uploadedLogoName: '',
        dotStyle: 'rect',
        eyeStyle: 'rect',
        history: state.history // 히스토리는 유지
      };

      // 입력 양식 복구
      document.getElementById('input-url').value = 'https://www.google.com';
      document.getElementById('input-text').value = '';
      document.getElementById('input-wifi-ssid').value = '';
      document.getElementById('input-wifi-pass').value = '';
      document.getElementById('input-wifi-type').value = 'WPA';
      document.getElementById('input-card-name').value = '';
      document.getElementById('input-card-phone').value = '';
      document.getElementById('input-card-email').value = '';
      document.getElementById('input-card-org').value = '';

      // 색상 복구
      document.getElementById('color-foreground').value = '#1e1b4b';
      document.getElementById('color-foreground-hex').value = '#1E1B4B';
      document.getElementById('color-background').value = '#ffffff';
      document.getElementById('color-background-hex').value = '#FFFFFF';

      document.getElementById('select-dot-type').value = 'rect';
      document.getElementById('select-eye-type').value = 'rect';

      // 업로드 영역 초기화
      document.getElementById('uploaded-info-area').classList.add('hidden');
      document.getElementById('logo-upload').value = '';

      switchType('url');
      selectLogo('none');
      showToast('info', '모든 양식이 초기화되었습니다.');
    }

    // 보관함(히스토리) 세션 관리
    function saveToHistory() {
      const content = getQRData();
      
      // 식별 가능한 심플 타이틀
      let title = '';
      if (state.type === 'url') {
        const shortUrl = content.replace(/^https?:\/\/(www\.)?/, '').substring(0, 15);
        title = `🌐 URL: ${shortUrl}...`;
      } else if (state.type === 'text') {
        title = `📝 텍스트: ${content.substring(0, 12)}...`;
      } else if (state.type === 'wifi') {
        const ssid = document.getElementById('input-wifi-ssid').value || 'WIFI';
        title = `📶 와이파이: ${ssid}`;
      } else {
        const name = document.getElementById('input-card-name').value || '연락처';
        title = `👤 명함: ${name}`;
      }

      const item = {
        id: Date.now(),
        title: title,
        config: JSON.parse(JSON.stringify(state)) // 딥카피
      };

      // 중복 방지 (동일 콘텐츠는 보관함 최상단으로 유치)
      state.history = state.history.filter(h => h.title !== title);
      state.history.unshift(item);

      // 최대 10개로 한정
      if (state.history.length > 10) {
        state.history.pop();
      }

      saveHistoryToLocal();
      renderHistory();
      showToast('success', '보관함에 저장했습니다!');
    }

    // 보관함 아이템 복원하기
    function loadHistoryItem(id) {
      const item = state.history.find(h => h.id === id);
      if (!item) return;

      const savedState = item.config;
      
      // 상태 전환 및 매칭
      state.type = savedState.type;
      state.colors = savedState.colors;
      state.logoType = savedState.logoType;
      state.presetEmoji = savedState.presetEmoji;
      state.uploadedLogoUrl = savedState.uploadedLogoUrl;
      state.uploadedLogoName = savedState.uploadedLogoName;
      state.dotStyle = savedState.dotStyle || 'rect';
      state.eyeStyle = savedState.eyeStyle || 'rect';

      // 각 옵션 화면 싱크
      document.getElementById('color-foreground').value = state.colors.foreground;
      document.getElementById('color-foreground-hex').value = state.colors.foreground.toUpperCase();
      document.getElementById('color-background').value = state.colors.background;
      document.getElementById('color-background-hex').value = state.colors.background.toUpperCase();

      document.getElementById('select-dot-type').value = state.dotStyle;
      document.getElementById('select-eye-type').value = state.eyeStyle;

      switchType(state.type);
      selectLogo(state.logoType);
      
      if (state.logoType === 'preset') {
        setPresetEmoji(state.presetEmoji);
      } else if (state.logoType === 'upload' && state.uploadedLogoUrl) {
        document.getElementById('uploaded-logo-preview').src = state.uploadedLogoUrl;
        document.getElementById('uploaded-logo-name').innerText = state.uploadedLogoName;
        document.getElementById('uploaded-info-area').classList.remove('hidden');
      }

      showToast('info', '보관해 둔 QR 설정을 성공적으로 불러왔습니다.');
    }

    // 로컬 스토리지에 세션 히스토리 저장
    function saveHistoryToLocal() {
      // 로컬 스토리지의 사이즈 제한 문제(업로드한 고용량 로고)를 회피하기 위해 데이터 크기 최적화 진행
      const minimalHistory = state.history.map(item => {
        // 이미지가 크다면 히스토리 세션 보존용으로만 경량화
        if (item.config.uploadedLogoUrl && item.config.uploadedLogoUrl.length > 100000) {
          item.config.uploadedLogoUrl = null; // 대용량 이미지는 로컬 스토리지 한계로 영구 캐싱 제외
        }
        return item;
      });
      localStorage.setItem('qr_craft_history', JSON.stringify(minimalHistory));
    }

    function loadHistoryFromLocal() {
      const saved = localStorage.getItem('qr_craft_history');
      if (saved) {
        try {
          state.history = JSON.parse(saved);
          renderHistory();
        } catch (e) {
          state.history = [];
        }
      }
    }

    function renderHistory() {
      const container = document.getElementById('history-container');
      const emptyMsg = document.getElementById('history-empty');

      // 리스트 영역 비우기
      container.querySelectorAll('.history-item').forEach(el => el.remove());

      if (state.history.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }

      emptyMsg.classList.add('hidden');

      state.history.forEach(item => {
        const row = document.createElement('div');
        row.className = 'history-item flex items-center justify-between p-2.5 bg-slate-50 hover:bg-indigo-50 border border-slate-100 rounded-xl group transition-all text-xs cursor-pointer';
        row.innerHTML = `
          <div class="flex items-center gap-2 flex-grow truncate" onclick="loadHistoryItem(${item.id})">
            <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
            <span class="font-medium text-slate-700 truncate">${item.title}</span>
          </div>
          <button onclick="deleteHistoryItem(event, ${item.id})" class="text-slate-400 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
            <i class="fa-regular fa-trash-can"></i>
          </button>
        `;
        container.appendChild(row);
      });
    }

    function deleteHistoryItem(e, id) {
      e.stopPropagation();
      state.history = state.history.filter(item => item.id !== id);
      saveHistoryToLocal();
      renderHistory();
      showToast('info', '보관함에서 항목이 삭제되었습니다.');
    }

    function clearAllHistory() {
      state.history = [];
      saveHistoryToLocal();
      renderHistory();
      showToast('info', '보관함의 모든 내용이 초기화되었습니다.');
    }

    // 토스트 알림창 애니메이션 효과
    function showToast(type, msg) {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMsg = document.getElementById('toast-msg');

      // 타입별 아이콘 분기
      if (type === 'success') {
        toastIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        toastIcon.className = 'text-emerald-400';
      } else if (type === 'warning') {
        toastIcon.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i>';
        toastIcon.className = 'text-amber-400';
      } else if (type === 'error') {
        toastIcon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
        toastIcon.className = 'text-rose-400';
      } else {
        toastIcon.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
        toastIcon.className = 'text-sky-400';
      }

      toastMsg.innerText = msg;

      // 노출 및 전환
      toast.classList.remove('translate-y-12', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-12', 'opacity-0');
      }, 3000);
    }
  </script>
</body>
</html>
